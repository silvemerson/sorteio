<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Admin{% endblock %} — Sorteio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --doug-primary: #009B3A;
    --doug-accent: #FFD700;
    --cncf-primary: #0078D7;
    --cncf-accent: #00D1FF;
    --bg: #0d0d0d;
    --surface: #181818;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #888;
    --radius: 14px;
    --font-head: 'Inter', sans-serif;
    --font-body: 'Inter', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }
  a { color: inherit; text-decoration: none; }

  .admin-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-brand { font-family: var(--font-head); font-weight: 800; font-size: 1rem; letter-spacing: -0.5px; }
  .nav-links { display: flex; align-items: center; gap: 4px; }
  .nav-links a {
    padding: 6px 14px; border-radius: 8px; font-size: 0.83rem;
    color: var(--muted); transition: all 0.2s;
  }
  .nav-links a:hover { color: var(--text); background: rgba(255,255,255,0.06); }
  .nav-new { background: rgba(255,255,255,0.08) !important; color: var(--text) !important; font-weight: 500; }
  .nav-logout { color: #ff6060 !important; }
  .nav-logout:hover { background: rgba(255,60,60,0.1) !important; }

  .admin-wrap { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }

  .page-header { margin-bottom: 28px; }
  .page-header h1 { font-family: var(--font-head); font-size: 1.8rem; font-weight: 800; }
  .page-header p { color: var(--muted); margin-top: 6px; font-size: 0.9rem; }

  .breadcrumb { font-size: 0.78rem; color: var(--muted); margin-bottom: 14px; }
  .breadcrumb a { color: var(--muted); }
  .breadcrumb a:hover { color: var(--text); }
  .breadcrumb span { margin: 0 6px; opacity: 0.5; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
  .card h2 {
    font-family: var(--font-head); font-size: 0.8rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 16px;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 20px; border: none; border-radius: 10px;
    font-family: var(--font-head); font-weight: 700; font-size: 0.82rem;
    letter-spacing: 0.3px; cursor: pointer; transition: all 0.2s;
    text-transform: uppercase; text-decoration: none; white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
  .btn-primary { background: var(--cncf-primary); color: #fff; }
  .btn-primary:hover { background: #0086ef; }
  .btn-danger { background: rgba(255,60,60,0.12); color: #ff6060; border: 1px solid rgba(255,60,60,0.25); }
  .btn-danger:hover { background: rgba(255,60,60,0.22); }
  .btn-ghost { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: rgba(255,255,255,0.1); color: var(--text); }
  .btn-lg { padding: 14px 36px; font-size: 0.95rem; border-radius: 50px; }

  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 20px;
    font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge-doug { background: rgba(0,155,58,0.15); color: var(--doug-accent); border: 1px solid rgba(0,155,58,0.35); }
  .badge-cncf { background: rgba(0,120,215,0.15); color: var(--cncf-accent); border: 1px solid rgba(0,120,215,0.3); }

  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; color: var(--text);
    font-family: var(--font-body); font-size: 0.93rem; outline: none; transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: rgba(255,255,255,0.25); }
  .form-group select option { background: #222; }
  .form-group textarea { min-height: 80px; resize: vertical; }

  .alert { padding: 12px 16px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 20px; }
  .alert-err { background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.3); color: #ff6060; }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    padding: 14px 20px; border-radius: 12px; font-size: 0.88rem;
    z-index: 999; display: none;
  }
  .toast.ok  { background: rgba(0,220,120,0.15); border: 1px solid rgba(0,220,120,0.4); color: #00dc78; }
  .toast.err { background: rgba(255,80,80,0.15); border: 1px solid rgba(255,80,80,0.4); color: #ff6060; }

  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .flex-wrap { flex-wrap: wrap; gap: 12px; }
</style>
</head>
<body>

<nav class="admin-nav">
  <a href="/admin/dashboard" class="nav-brand">🎲 Sorteio Admin</a>
  <div class="nav-links">
    <a href="/admin/dashboard">Dashboard</a>
    <a href="/admin/sorteio/criar" class="nav-new">+ Novo Sorteio</a>
    <a href="/admin/logout" class="nav-logout">Sair</a>
  </div>
</nav>

<div class="admin-wrap">
  {% block content %}{% endblock %}
</div>

<div class="toast" id="g-toast"></div>

<script>
function showToast(msg, tipo) {
  const t = document.getElementById('g-toast');
  t.textContent = msg;
  t.className = 'toast ' + tipo;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3500);
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
